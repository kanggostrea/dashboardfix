version: '3.8'
services:
  dashboard-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghost-dashboard-backend
    ports:
      - "5000:5000"  # ✅ Hanya ini yang perlu expose
    environment:
      - DASHBOARD_AUTH_KEY=GHOST_SECRET_2026
      - FLASK_ENV=production
    volumes:
      - ./backend:/app
      - ./frontend:/app/static  # ✅ Serve static files dari Flask
    restart: unless-stopped
